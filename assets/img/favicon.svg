<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">
  <defs>
    <!-- Background gradient: deep space dark -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#080612"/>
    </linearGradient>

    <!-- Main letter gradient: violet → cyan -->
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="45%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Glow filter for the letters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle border ring -->
  <rect width="62" height="62" x="1" y="1" rx="13" ry="13"
        fill="none" stroke="url(#ring)" stroke-width="1"/>

  <!-- 
    "VM" monogram — geometric, compact
    V: left half  (two diagonal strokes meeting at bottom center)
    M: right half (two vertical strokes with inner peaks)
    Combined they share a thin gap at the center
  -->

  <!-- "V" glyph — left side, strokes meet at bottom -->
  <!-- Left arm of V -->
  <line x1="7"  y1="18" x2="18" y2="46"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right arm of V -->
  <line x1="18" y1="46" x2="28" y2="18"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- "M" glyph — right side -->
  <!-- Left vertical of M -->
  <line x1="34" y1="18" x2="34" y2="46"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Left peak of M -->
  <line x1="34" y1="18" x2="41" y2="30"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right peak of M -->
  <line x1="41" y1="30" x2="48" y2="18"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right vertical of M -->
  <line x1="48" y1="18" x2="48" y2="46"
        stroke="url(#letter)" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Cyan accent dot at the bottom of V (focal point) -->
  <circle cx="18" cy="46" r="2.5" fill="#22d3ee" opacity="0.9"/>
</svg>
